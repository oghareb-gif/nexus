<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#070a08" />
<title>My account — Nexus Clinic</title>
<meta name="description" content="Your Nexus Clinic account — upcoming reservations, visit history and loyalty progress." />
<meta name="robots" content="noindex" />
<link rel="icon" href="assets/img/logo.svg" type="image/svg+xml" />
<link rel="icon" href="assets/img/favicon-64.png" type="image/png" sizes="64x64" />
<link rel="apple-touch-icon" href="assets/img/apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@300;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/css/nexus.css" />
</head>
<body>

<nav>
  <div class="wrap">
    <a href="index.html" class="logo"><img class="logo-mark" src="assets/img/logo.svg" alt="" width="100" height="100" /><span class="wm"><span class="wm-row">NE<svg class="wm-x" viewBox="0 0 68 100" aria-hidden="true"><defs><linearGradient id="wmxg6" x1="0.4" y1="0" x2="0.6" y2="1"><stop offset="0" stop-color="#2ec900"/><stop offset="1" stop-color="#bff24d"/></linearGradient></defs><line x1="35" y1="47" x2="55" y2="96" stroke="currentColor" stroke-width="10.5" stroke-linecap="round"/><line x1="5" y1="96" x2="63" y2="5" stroke="currentColor" stroke-width="10.5" stroke-linecap="round"/><path d="M15.4 8 A5 5 0 0 1 24.6 4 L34 38 Z" fill="url(#wmxg6)"/></svg>US</span><em class="wm-clinic">clinic</em></span></a>
    <div class="nav-links">
      <a href="index.html#services">Treatments</a>
      <a href="index.html#reviews">Reviews</a>
      <a href="index.html#team">Team</a>
      <a href="index.html#contact">Contact</a>
    </div>
    <div class="nav-actions">
      <button class="ghost" id="logoutBtn" style="padding:11px 16px;">Sign out</button>
      <a href="book.html" class="btn">Book a session</a>
    </div>
  </div>
</nav>

<main class="account-page">
  <header class="account-hero">
    <div>
      <div class="eyebrow">Your Nexus account</div>
      <h1 id="acHello">Hello</h1>
      <p id="acContact" class="mono"></p>
    </div>
    <a href="book.html" class="btn lg" id="acBookBtn">+ Book a session</a>
  </header>

  <!-- Top cards: loyalty + stats -->
  <div class="account-grid">
    <section class="account-card loyalty-card" id="loyaltyCard"></section>
    <section class="account-card stats-card">
      <h3>Your history</h3>
      <div class="stat-row" id="acStats"></div>
    </section>
  </div>

  <!-- Upcoming reservations -->
  <section class="account-card">
    <div class="dp-head">
      <h3>Upcoming reservations</h3>
      <span class="count" id="upcomingMeta"></span>
    </div>
    <div id="upcomingList"></div>
  </section>

  <!-- Past visits -->
  <section class="account-card">
    <div class="dp-head">
      <h3>Past & cancelled</h3>
      <span class="count" id="pastMeta"></span>
    </div>
    <div id="pastList"></div>
  </section>
</main>

<script src="assets/js/config.js"></script>
<script src="assets/js/icons.js"></script>
<script src="assets/js/whatsapp.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/store.js"></script>
<script src="assets/js/account.js"></script>
<script src="assets/js/nav.js"></script>
</body>
</html>
